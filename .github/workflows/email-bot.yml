name: Run Email Bot Every 5 Minutes

on:
  schedule:
    - cron: "*/5 * * * *"  # Every 5 minutes
  workflow_dispatch:        # Optional: allows manual trigger

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r codeforces-rating-bot/requirements.txt

    - name: Validate required secrets
      env:
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      run: |
        test -n "$SMTP_SERVER" || { echo "Missing secret: SMTP_SERVER"; exit 1; }
        test -n "$SMTP_PORT" || { echo "Missing secret: SMTP_PORT"; exit 1; }
        test -n "$SMTP_USER" || { echo "Missing secret: SMTP_USER"; exit 1; }
        test -n "$SMTP_PASSWORD" || { echo "Missing secret: SMTP_PASSWORD"; exit 1; }
        test -n "$GCP_SA_KEY" || { echo "Missing secret: GCP_SA_KEY"; exit 1; }

    - name: Create Google Cloud credentials file
      run: echo '${{ secrets.GCP_SA_KEY }}' > codeforces-rating-bot/service_account.json

    - name: Run python bot
      env:
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      run: |
        cd codeforces-rating-bot
        python3 bot.py
